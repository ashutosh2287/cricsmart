<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none">
  <defs>
    <linearGradient id="icon-grad" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0" y1="0" x2="120" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- Icon: Stylized cricket ball with lens flare -->
  <g transform="translate(2, 4)">
    <!-- Ball base -->
    <circle cx="20" cy="20" r="18" fill="url(#icon-grad)" opacity="0.9"/>
    <!-- Seam line -->
    <path d="M8 12 Q20 28 32 12" stroke="white" stroke-width="1.5" fill="none" opacity="0.6"/>
    <path d="M8 28 Q20 12 32 28" stroke="white" stroke-width="1.5" fill="none" opacity="0.6"/>
    <!-- Lens reflection -->
    <circle cx="14" cy="14" r="4" fill="white" opacity="0.25"/>
    <circle cx="14" cy="14" r="1.5" fill="white" opacity="0.5"/>
  </g>

  <!-- Text: CricLens -->
  <text x="48" y="33" font-family="Space Grotesk, DM Sans, sans-serif" font-size="26" font-weight="700" letter-spacing="-0.5">
    <tspan fill="url(#text-grad)">Cric</tspan><tspan fill="#F0F4F8">Lens</tspan>
  </text>
</svg>
